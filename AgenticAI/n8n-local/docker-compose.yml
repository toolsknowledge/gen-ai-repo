version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Core config
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production

      # IMPORTANT: This tells n8n what URL to use for OAuth callbacks
      # We'll update this with the ngrok URL in Part 2
      - WEBHOOK_URL=https://outdoors-defame-stench.ngrok-free.dev/

      # Security — change this to a strong random string
      - N8N_ENCRYPTION_KEY=e2ee6e3dac53312582be6dd5e88edc10

      # Optional: disable telemetry
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false

      # Timezone
      - GENERIC_TIMEZONE=Asia/Kolkata

    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
    driver: local