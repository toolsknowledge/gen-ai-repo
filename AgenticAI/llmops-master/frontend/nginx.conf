# Nginx config for the React frontend container.
# - Serves the React static bundle from /usr/share/nginx/html
# - Reverse-proxies /api/* to the FastAPI backend container.
#   (The backend service is named "backend" in docker-compose.yml,
#    and Docker's internal DNS resolves it to its IP.)

server {
    listen 80;
    server_name _;

    # Logs to stdout/stderr so `docker logs` shows them
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Allow large PDF uploads
    client_max_body_size 50M;

    # ── React SPA ────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ────────────────────────────────────
    # All /api/* requests are forwarded to the FastAPI container.
    # The /api prefix is stripped so /api/upload-pdf/ → /upload-pdf/
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-running requests (LLM calls can take 10–30s)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}